<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseChat</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- SIDEBAR HEADER -->
            <div class="sidebar-header">
                <div class="profile-avatar">E</div>
                <span class="sidebar-brand">PulseChat</span>
                <div class="sidebar-icons">
                    <button class="icon-btn" title="Chat baru">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                    </button>
                    <button class="icon-btn" title="Menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="1" />
                            <circle cx="12" cy="12" r="1" />
                            <circle cx="12" cy="19" r="1" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- SEARCH -->
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" placeholder="Cari atau mulai chat baru">
            </div>

            <!-- USER LIST -->
            <div class="chat-list" id="usersList">
                <!-- Diisi oleh JS -->
            </div>

        </aside>

        <!-- CHAT ROOM -->
        <main class="chat-room">

            <!-- HEADER -->
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
                <div class="chat-header-info">
                    <h2 id="chatHeaderName">Pilih kontak</h2>
                    <p id="username">Memuat...</p>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn" title="Cari pesan">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </button>
                    <button class="icon-btn" title="Menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="1" />
                            <circle cx="12" cy="12" r="1" />
                            <circle cx="12" cy="19" r="1" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- MESSAGES -->
            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <p>Pilih kontak untuk mulai mengobrol</p>
                </div>
            </div>

            <!-- TYPING -->
            <div id="typingIndicator" class="typing-indicator"></div>

            <!-- INPUT AREA -->
            <div class="input-area">
                <input type="file" id="fileInput" hidden>
                <button type="button" class="icon-btn" id="uploadBtn" title="Lampirkan file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                    </svg>
                </button>

                <form class="message-form" id="messageForm">
                    <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
                    <button type="submit" class="send-btn" title="Kirim">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </form>
            </div>

        </main>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="js/chat.js"></script>

</body>

</html>
